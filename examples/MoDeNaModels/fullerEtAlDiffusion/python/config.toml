# Fuller et al. diffusion coefficient — ForwardMappingModel
# D_AB = 1.011e-4 * T^1.75 * sqrt(1/W_A + 1/W_B) / (p * (V_A^(1/3) + V_B^(1/3))^2)
#
# Species pair: A = H2O, B = N2 (from the IndexSet definition in the module).
# bounds: effectively unbounded (wide physics-valid domain).
# parameters: [W[A], V[A], W[B], V[B]] — molecular weights and diffusion volumes.

[surrogate]

[surrogate.inputs.T]
min = 0.0
max = 9.0e99

[surrogate.inputs.p]
min = 0.0
max = 9.0e99

[surrogate.outputs."D[A]"]
min = 0.0
max = 9.0e99

[surrogate.parameters."W[A]"]
min = 0.0
max = 9.0e99

[surrogate.parameters."V[A]"]
min = 0.0
max = 9.0e99

[surrogate.parameters."W[B]"]
min = 0.0
max = 9.0e99

[surrogate.parameters."V[B]"]
min = 0.0
max = 9.0e99

# Initial parameter values: W[H2O]=16, V[H2O]=9.44, W[N2]=14, V[N2]=11.38
parameters = [16.0, 9.44, 14.0, 11.38]
